<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b45cff"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0b0018"/>
  <!-- Gradient border ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.7"/>
  <!-- FOR text -->
  <text x="32" y="42"
    font-family="'Poppins', 'Arial', sans-serif"
    font-weight="700"
    font-size="22"
    text-anchor="middle"
    fill="url(#g)"
    filter="url(#glow)">FOR</text>
</svg>
